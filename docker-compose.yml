version: '3.8'

services:
  solar_energy_monitor:
    image: faffi86/mytapo-solar:latest
    pull_policy: always
    platform: linux/amd64
    network_mode: "bridge"
    restart: unless-stopped
    environment:
      - TAPO_USERNAME=${TAPO_USERNAME}
      - TAPO_PASSWORD=${TAPO_PASSWORD}
      - PUSHOVER_USER_KEY=${PUSHOVER_USER_KEY}
      - PUSHOVER_USER_GROUP_WOERIS=${PUSHOVER_USER_GROUP_WOERIS}
      - PUSHOVER_TAPO_API_TOKEN=${PUSHOVER_TAPO_API_TOKEN}
      - SOLAR_IP_ADDRESS=${SOLAR_IP_ADDRESS}
      - AWTRIX_HOST=${AWTRIX_HOST}
      - AWTRIX_PORT=${AWTRIX_PORT}

  washing_machine_alert:
    image: faffi86/mytapo-washing:latest
    pull_policy: always
    platform: linux/amd64
    network_mode: "bridge"
    restart: unless-stopped
    environment:
      - TAPO_USERNAME=${TAPO_USERNAME}
      - TAPO_PASSWORD=${TAPO_PASSWORD}
      - PUSHOVER_USER_GROUP_WOERIS=${PUSHOVER_USER_GROUP_WOERIS}
      - PUSHOVER_TAPO_API_TOKEN=${PUSHOVER_TAPO_API_TOKEN}
      - WASHING_MACHINE_IP_ADDRESS=${WASHING_MACHINE_IP_ADDRESS}
      - AWTRIX_HOST=${AWTRIX_HOST}
      - AWTRIX_PORT=${AWTRIX_PORT}

  washing_dryer_alert:
    image: faffi86/mytapo-dryer:latest
    pull_policy: always
    platform: linux/amd64
    network_mode: "bridge"
    restart: unless-stopped
    environment:
      - TAPO_USERNAME=${TAPO_USERNAME}
      - TAPO_PASSWORD=${TAPO_PASSWORD}
      - PUSHOVER_USER_GROUP_WOERIS=${PUSHOVER_USER_GROUP_WOERIS}
      - PUSHOVER_TAPO_API_TOKEN=${PUSHOVER_TAPO_API_TOKEN}
      - WASHING_DRYER_IP_ADDRESS=${WASHING_DRYER_IP_ADDRESS}
      - AWTRIX_HOST=${AWTRIX_HOST}
      - AWTRIX_PORT=${AWTRIX_PORT}

  influx_consumption:
    image: faffi86/mytapo-influx_consumption:latest
    pull_policy: always
    platform: linux/amd64
    network_mode: "bridge"
    restart: unless-stopped
    volumes:
      - config:/usr/src/app/config
    environment:
      - TAPO_USERNAME=${TAPO_USERNAME}
      - TAPO_PASSWORD=${TAPO_PASSWORD}
      - INFLUXDB_HOST=${INFLUXDB_HOST}
      - INFLUXDB_PORT=${INFLUXDB_PORT}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - AWTRIX_HOST=${AWTRIX_HOST}
      - AWTRIX_PORT=${AWTRIX_PORT}

  event_detector:
    image: faffi86/mytapo-event_detector:latest
    pull_policy: always
    platform: linux/amd64
    network_mode: "bridge"
    restart: unless-stopped
    volumes:
      - config:/usr/src/app/config
      - analytics:/usr/src/app/analytics
    environment:
      - INFLUXDB_HOST=${INFLUXDB_HOST}
      - INFLUXDB_PORT=${INFLUXDB_PORT}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - INFLUXDB_EVENTS_BUCKET=${INFLUXDB_EVENTS_BUCKET}
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - AWTRIX_HOST=${AWTRIX_HOST}
      - AWTRIX_PORT=${AWTRIX_PORT}
      - PUSHOVER_USER_GROUP_WOERIS=${PUSHOVER_USER_GROUP_WOERIS}
      - PUSHOVER_TAPO_API_TOKEN=${PUSHOVER_TAPO_API_TOKEN}

  consumption_reporter:
    image: faffi86/mytapo-consumption_reporter:latest
    pull_policy: always
    platform: linux/amd64
    network_mode: "bridge"
    restart: unless-stopped
    volumes:
      - config:/usr/src/app/config
    environment:
      - INFLUXDB_HOST=${INFLUXDB_HOST}
      - INFLUXDB_PORT=${INFLUXDB_PORT}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - INFLUXDB_CONSUMPTION_BUCKET=${INFLUXDB_CONSUMPTION_BUCKET}
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - AWTRIX_HOST=${AWTRIX_HOST}
      - AWTRIX_PORT=${AWTRIX_PORT}
      - PUSHOVER_USER_GROUP_WOERIS=${PUSHOVER_USER_GROUP_WOERIS}
      - PUSHOVER_TAPO_API_TOKEN=${PUSHOVER_TAPO_API_TOKEN}

  report_api:
    image: faffi86/mytapo-report_api:latest
    pull_policy: always
    platform: linux/amd64
    network_mode: "bridge"
    restart: unless-stopped
    ports:
      - "8099:8099"
    environment:
      - INFLUXDB_HOST=${INFLUXDB_HOST}
      - INFLUXDB_PORT=${INFLUXDB_PORT}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - INFLUXDB_EVENTS_BUCKET=${INFLUXDB_EVENTS_BUCKET}
      - INFLUXDB_CONSUMPTION_BUCKET=${INFLUXDB_CONSUMPTION_BUCKET}
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - AWTRIX_HOST=${AWTRIX_HOST}
      - AWTRIX_PORT=${AWTRIX_PORT}
      - PUSHOVER_USER_GROUP_WOERIS=${PUSHOVER_USER_GROUP_WOERIS}
      - PUSHOVER_TAPO_API_TOKEN=${PUSHOVER_TAPO_API_TOKEN}
      - REPORT_API_TOKEN=${REPORT_API_TOKEN:-}
      - REPORT_API_PORT=8099

volumes:
  config:
  analytics: